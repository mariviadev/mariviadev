<svg width="800" height="170" viewBox="0 0 800 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B5EA7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Dark mode background (transparent, handled by GitHub theme) -->

  <!-- Line 1: plain dark text -->
  <text
    x="400" y="58"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="800"
    fill="#1A1A3E"
  >Designing intuitive experiences</text>

  <!-- Line 2: gradient purple text -->
  <text
    x="400" y="118"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="800"
    fill="url(#purpleGrad)"
  >for complex, data-driven products.</text>

  <!-- Dark mode variant using CSS media -->
  <style>
    @media (prefers-color-scheme: dark) {
      .hero-line1 { fill: #F0EEFF !important; }
    }
  </style>
  <!-- Rerender line 1 with class for dark mode -->
  <text
    x="400" y="58"
    text-anchor="middle"
    class="hero-line1"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="800"
    fill="#1A1A3E"
  >Designing intuitive experiences</text>
</svg>
